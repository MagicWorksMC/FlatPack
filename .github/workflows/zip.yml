name: Create Archive
on:
  push:
    paths:
      - "assets/**"
      - "README.md"
      - "pack.mcmeta"
      - "pack.png"
      
  workflow_dispatch:
      
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PACK_NAME: "FlatPack-Release.zip"

    steps:
    - name: Checkout source repo
      uses: actions/checkout@v3

    - name: Pull latest and remove old file
      run: |
        git config pull.rebase false
        git pull
        rm -f ${{ env.PACK_NAME }}

    - name: Archive Release
      uses: thedoctor0/zip-release@master
      with:
        filename: ${{ env.PACK_NAME }}
        exclusions: '*.git* /*node_modules/* .editorconfig'

    - name: Clone target repo
      run: |
        git clone https://github.com/MagicWorksMC/.github target
      env:
        GIT_ASKPASS: ""
        GITHUB_TOKEN: ${{ secrets.GITREPOPAT }}

    - name: Copy artifact into target repo  
      run: |
        cp ${{ env.PACK_NAME }} target/artifacts/resourcepacks

    - name: Commit & push to target repo (with original commit message)
      run: |
        cd target

        # Remove GitHub Actions default auth header (required for cross-repo push)
        git config --unset-all http.https://github.com/.extraheader

        # Extract previous commit info from source repo
        cd ..
        COMMIT_MSG="$(git log -1 --pretty=%B)"
        COMMIT_AUTHOR_NAME="${{ github.event.commits[0].author.username || '' }}"
        COMMIT_AUTHOR_EMAIL="$(git log -1 --pretty=%ae)"
        # Fallback author name if empty
        if [ -z "$COMMIT_AUTHOR_NAME" ]; then
          COMMIT_AUTHOR_NAME="$(git log -1 --pretty=%an)"
        fi

        FINAL_MSG="Updated Archive - $COMMIT_AUTHOR_NAME - $COMMIT_MSG"

        # Move back into target repo
        cd target

        # Configure bot identity
        git config user.name "Auto-Zip"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add -A
        git commit -m "$FINAL_MSG" || echo "No changes to commit"

        # Push using PAT
        git push https://x-access-token:${{ secrets.GITREPOPAT }}@github.com/MagicWorksMC/.github.git
